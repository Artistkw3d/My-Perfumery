{% extends "base.html" %}
{% block title %}My Perfumery - التركيبات{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
    :root {
        --cream: #f5f0eb;
        --sand: #e8ddd0;
        --brown: #8b7355;
        --brown-dark: #5c4a32;
        --brown-light: #c4a882;
        --gold: #b8956a;
        --rose: #c9847b;
        --green-e: #7d9c7b;
        --text-dark: #2d2418;
        --text-mid: #7a6b57;
        --text-light: #b5a898;
        --border-e: rgba(139,115,85,0.12);
    }

    .main-content { font-family: 'Tajawal', 'Segoe UI', sans-serif; }

    /* Header */
    .page-top {
        text-align: center;
        margin-bottom: 40px;
        position: relative;
    }
    .page-top::after {
        content: '';
        display: block;
        width: 60px;
        height: 2px;
        background: var(--gold);
        margin: 18px auto 0;
    }
    .page-top .logo-line {
        font-size: 0.8rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 700;
        margin-bottom: 8px;
    }
    .page-top h1 {
        font-size: 2.2rem;
        font-weight: 300;
        color: var(--text-dark);
        letter-spacing: 1px;
    }
    .page-top h1 strong { font-weight: 800; }
    .page-top .count-text {
        color: var(--text-light);
        font-size: 0.9rem;
        margin-top: 10px;
    }

    /* Toolbar */
    .toolbar-e {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 16px;
    }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn-e {
        background: none;
        border: 1.5px solid var(--border-e);
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 0.82rem;
        color: var(--text-mid);
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s;
        font-family: inherit;
    }
    .filter-btn-e:hover { border-color: var(--brown); color: var(--brown); }
    .filter-btn-e.active {
        background: var(--brown-dark);
        color: white;
        border-color: var(--brown-dark);
    }
    .search-add { display: flex; gap: 12px; align-items: center; }
    .search-elegant {
        background: white;
        border: 1.5px solid var(--border-e);
        padding: 10px 20px;
        border-radius: 50px;
        font-size: 0.85rem;
        width: 260px;
        font-family: inherit;
        color: var(--text-dark);
        transition: all 0.3s;
    }
    .search-elegant:focus { outline: none; border-color: var(--gold); }
    .search-elegant::placeholder { color: var(--text-light); }
    .btn-add-e {
        background: var(--brown-dark);
        color: white;
        border: none;
        padding: 10px 26px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.88rem;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .btn-add-e:hover { background: var(--brown); transform: translateY(-1px); color: white; }

    /* Formula List */
    .formula-list { display: flex; flex-direction: column; gap: 20px; }

    .formula-row {
        background: white;
        border-radius: 20px;
        display: flex;
        overflow: hidden;
        transition: all 0.4s;
        border: 1.5px solid transparent;
        position: relative;
    }
    .formula-row:hover {
        box-shadow: 0 12px 40px rgba(139,115,85,0.12);
        border-color: var(--sand);
        transform: translateY(-2px);
    }

    .accent-strip { width: 5px; flex-shrink: 0; }
    .accent-final { background: var(--green-e); }
    .accent-testing { background: var(--gold); }
    .accent-draft { background: var(--text-light); }

    .formula-num {
        width: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        font-weight: 300;
        color: var(--text-light);
        border-left: 1px solid var(--border-e);
        flex-shrink: 0;
    }

    .formula-main {
        flex: 1;
        padding: 24px 28px;
        min-width: 0;
    }
    .formula-title-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 6px;
    }
    .formula-title {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text-dark);
        cursor: pointer;
        transition: color 0.3s;
        text-decoration: none;
    }
    .formula-title:hover { color: var(--gold); }
    .status-dot {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
    }
    .dot-final { background: rgba(125,156,123,0.12); color: var(--green-e); }
    .dot-testing { background: rgba(184,149,106,0.12); color: var(--gold); }
    .dot-draft { background: rgba(181,168,152,0.12); color: var(--text-light); }
    .status-dot::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
    }
    .formula-desc-text {
        font-size: 0.85rem;
        color: var(--text-mid);
        margin-bottom: 14px;
        line-height: 1.6;
    }
    .formula-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
    }
    .mat-tag {
        background: var(--cream);
        color: var(--brown);
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        border: 1px solid var(--sand);
    }
    .mat-tag.extra-tag {
        background: transparent;
        border: 1px dashed var(--sand);
        color: var(--text-light);
    }
    .formula-meta {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
    }
    .meta-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        color: var(--text-mid);
    }
    .meta-item i { color: var(--brown-light); font-size: 0.9rem; }
    .meta-item strong { color: var(--text-dark); font-weight: 700; }

    .formula-chart-side {
        width: 200px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--cream);
        padding: 20px;
        border-right: 1px solid var(--border-e);
    }
    .chart-label {
        font-size: 0.7rem;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
        margin-bottom: 8px;
    }
    .no-olf-placeholder {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 2px dashed var(--sand);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-light);
        font-size: 0.75rem;
        text-align: center;
        line-height: 1.4;
    }

    .formula-actions-side {
        width: 56px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border-e);
    }
    .action-icon {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-bottom: 1px solid var(--border-e);
        color: var(--text-light);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        background: none;
    }
    .action-icon:last-child { border-bottom: none; }
    .action-icon:hover { color: var(--gold); background: var(--cream); }
    .action-icon.delete-icon:hover { color: #c0392b; background: #fdf2f2; }

    /* Empty state */
    .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-light);
    }
    .empty-state i { font-size: 3.5rem; color: var(--sand); }
    .empty-state p { margin-top: 12px; font-size: 1rem; }

    @media (max-width: 900px) {
        .formula-row { flex-direction: column; }
        .formula-chart-side {
            width: 100%;
            flex-direction: row;
            gap: 20px;
            padding: 16px;
            border-right: none;
            border-top: 1px solid var(--border-e);
        }
        .formula-num {
            width: 100%;
            border-left: none;
            border-bottom: 1px solid var(--border-e);
            padding: 10px;
            font-size: 1rem;
        }
        .formula-actions-side {
            width: 100%;
            flex-direction: row;
            border-right: none;
            border-top: 1px solid var(--border-e);
        }
        .action-icon { border-bottom: none; border-left: 1px solid var(--border-e); }
        .accent-strip { width: 100%; height: 4px; }
        .search-elegant { width: 180px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-top">
    <div class="logo-line">PERFUME VAULT</div>
    <h1><strong>التركيبات</strong> العطرية</h1>
    <div class="count-text"><span id="formulaCount">0</span> تركيبة في مجموعتك</div>
</div>

<div class="toolbar-e">
    <div class="filter-row">
        <button class="filter-btn-e active" data-filter="all">جميع التركيبات</button>
        <button class="filter-btn-e" data-filter="final">نهائي</button>
        <button class="filter-btn-e" data-filter="testing">تجريب</button>
        <button class="filter-btn-e" data-filter="draft">مسودة</button>
    </div>
    <div class="search-add">
        <input class="search-elegant" id="searchInput" placeholder="ابحث بالاسم او المكون...">
        <button class="btn-add-e" onclick="showCreateModal()"><i class="bi bi-plus-lg"></i> تركيبة جديدة</button>
    </div>
</div>

<div class="formula-list" id="formulasContainer"></div>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">تركيبة جديدة</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createForm">
                    <input type="hidden" name="action" value="create">
                    <div class="mb-3">
                        <label class="form-label">اسم التركيبة</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الوصف</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn" style="background:var(--brown-dark);color:white;" onclick="createFormula()">
                    <i class="bi bi-plus-circle"></i> إنشاء
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const createModal = new bootstrap.Modal(document.getElementById('createModal'));
const OLF_CATS = ['citrus','aldehydic','aromatic','green','marine','floral','fruity','spicy','balsamic','woody','ambery','musky','leathery','animal'];
const OLF_LABELS = ['Citrus','Aldehydic','Aromatic','Green','Marine','Floral','Fruity','Spicy','Balsamic','Woody','Ambery','Musky','Leathery','Animal'];
const OLF_COLORS = ['#d4a853','#b5a898','#7d9c7b','#8fb87d','#6b94b0','#c9847b','#c47058','#b85c3a','#8b7355','#5c4a32','#b8956a','#9e8dc4','#6B4226','#703030'];

let allFormulas = [];
let currentFilter = 'all';

function loadFormulas() {
    fetch('/api/formulas')
        .then(r => r.json().then(data => ({ok: r.ok, data})))
        .then(({ok, data}) => {
            if (ok && data.success) {
                allFormulas = data.data;
                document.getElementById('formulaCount').textContent = allFormulas.length;
                renderFormulas(allFormulas);
            } else {
                const msg = data.message || 'Unknown error';
                console.error('API error:', msg, data);
                document.getElementById('formulasContainer').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle" style="font-size:2rem;color:var(--red);"></i><p style="color:var(--red);">' + msg + '</p></div>';
            }
        })
        .catch(err => {
            console.error('Load formulas error:', err);
            document.getElementById('formulasContainer').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle" style="font-size:2rem;color:var(--red);"></i><p style="color:var(--red);">Connection error: ' + err.message + '</p></div>';
        });
}

function renderFormulas(formulas) {
    const container = document.getElementById('formulasContainer');
    if (!formulas.length) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>لا توجد تركيبات بعد</p></div>';
        return;
    }

    const statusClasses = { final: 'accent-final', testing: 'accent-testing', draft: 'accent-draft' };
    const dotClasses = { final: 'dot-final', testing: 'dot-testing', draft: 'dot-draft' };
    const statusLabels = { final: 'نهائي', testing: 'تجريب', draft: 'مسودة' };

    container.innerHTML = formulas.map((f, idx) => {
        const maxShow = 6;
        const names = f.ingredient_names || [];
        const shown = names.slice(0, maxShow);
        const extra = names.length - maxShow;
        const num = String(idx + 1).padStart(2, '0');
        const hasOlf = f.olfactive_profile && OLF_CATS.some(c => (f.olfactive_profile[c] || 0) > 0);

        return `
        <div class="formula-row" data-status="${f.status}">
            <div class="accent-strip ${statusClasses[f.status] || 'accent-draft'}"></div>
            <div class="formula-num">${num}</div>
            <div class="formula-main">
                <div class="formula-title-row">
                    <a class="formula-title" href="/formula/${f.id}">${f.name}</a>
                    <span class="status-dot ${dotClasses[f.status] || 'dot-draft'}">${statusLabels[f.status] || f.status}</span>
                </div>
                ${f.description ? `<div class="formula-desc-text">${f.description}</div>` : ''}
                <div class="formula-tags">
                    ${shown.map(n => `<span class="mat-tag">${n}</span>`).join('')}
                    ${extra > 0 ? `<span class="mat-tag extra-tag">+${extra} أخرى</span>` : ''}
                    ${!names.length ? '<span style="font-size:0.8rem;color:var(--text-light);">لا توجد مكونات</span>' : ''}
                </div>
                <div class="formula-meta">
                    <div class="meta-item"><i class="bi bi-layers"></i> مكونات: <strong>${f.ingredients_count}</strong></div>
                    <div class="meta-item"><i class="bi bi-speedometer2"></i> الوزن: <strong>${f.total_weight ? f.total_weight.toFixed(2) + ' g' : '-'}</strong></div>
                    <div class="meta-item"><i class="bi bi-cash-coin"></i> التكلفة: <strong>${f.total_cost ? f.total_cost.toFixed(2) : '-'}</strong></div>
                    <div class="meta-item"><i class="bi bi-calendar3"></i> <strong>${f.created_at ? f.created_at.substring(0, 10) : '-'}</strong></div>
                </div>
            </div>
            <div class="formula-chart-side">
                <div class="chart-label">البروفايل العطري</div>
                ${hasOlf ? `<canvas id="fwheel_${f.id}" width="140" height="140"></canvas>` : '<div class="no-olf-placeholder"><i class="bi bi-bullseye"></i><br>لا يوجد<br>بروفايل</div>'}
            </div>
            <div class="formula-actions-side">
                <a class="action-icon" href="/formula/${f.id}" title="عرض"><i class="bi bi-eye"></i></a>
                <a class="action-icon" href="/formula/${f.id}/card" title="بطاقة"><i class="bi bi-card-heading"></i></a>
                <button class="action-icon" onclick="duplicateFormula(${f.id})" title="نسخ"><i class="bi bi-copy"></i></button>
                <button class="action-icon delete-icon" onclick="deleteFormula(${f.id}, '${f.name.replace(/'/g, "\\'")}')" title="حذف"><i class="bi bi-trash"></i></button>
            </div>
        </div>`;
    }).join('');

    // Draw polar area charts
    setTimeout(() => {
        formulas.forEach(f => {
            const hasOlf = f.olfactive_profile && OLF_CATS.some(c => (f.olfactive_profile[c] || 0) > 0);
            if (!hasOlf) return;
            const canvas = document.getElementById('fwheel_' + f.id);
            if (!canvas) return;
            const data = OLF_CATS.map(c => f.olfactive_profile[c] || 0);
            const fMax = Math.max(...data, 1);
            const fDynMax = Math.ceil(fMax * 1.3);
            const fStep = fDynMax <= 5 ? 1 : 2;
            new Chart(canvas.getContext('2d'), {
                type: 'polarArea',
                data: {
                    labels: OLF_LABELS,
                    datasets: [{
                        data: data,
                        backgroundColor: OLF_COLORS.map(c => c + '66'),
                        borderColor: OLF_COLORS,
                        borderWidth: 1.5
                    }]
                },
                options: {
                    responsive: false,
                    animation: { duration: 400 },
                    layout: { padding: 4 },
                    plugins: { legend: { display: false }, tooltip: { enabled: true } },
                    scales: {
                        r: {
                            min: 0, max: fDynMax,
                            ticks: { display: false },
                            grid: { color: 'rgba(139,115,85,0.08)' }
                        }
                    }
                }
            });
        });
    }, 100);
}

// Filter
document.querySelectorAll('.filter-btn-e').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn-e').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        applyFilters();
    });
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
    applyFilters();
});

function applyFilters() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = allFormulas;

    if (currentFilter !== 'all') {
        filtered = filtered.filter(f => f.status === currentFilter);
    }
    if (query) {
        filtered = filtered.filter(f => {
            const nameMatch = f.name.toLowerCase().includes(query);
            const descMatch = f.description && f.description.toLowerCase().includes(query);
            const ingMatch = (f.ingredient_names || []).some(n => n.toLowerCase().includes(query));
            return nameMatch || descMatch || ingMatch;
        });
    }
    renderFormulas(filtered);
}

function showCreateModal() {
    document.getElementById('createForm').reset();
    createModal.show();
}

function createFormula() {
    const formData = new FormData(document.getElementById('createForm'));
    fetch('/api/formulas', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            createModal.hide();
            window.location.href = '/formula/' + data.id;
        } else {
            showAlert(data.message || 'خطأ', 'danger');
        }
    });
}

function duplicateFormula(id) {
    const formData = new FormData();
    formData.append('action', 'duplicate');
    formData.append('id', id);
    fetch('/api/formulas', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showAlert('تم النسخ');
            window.location.href = '/formula/' + data.id;
        }
    });
}

function deleteFormula(id, name) {
    if (confirm('هل تريد حذف "' + name + '"؟')) {
        const formData = new FormData();
        formData.append('action', 'delete');
        formData.append('id', id);
        fetch('/api/formulas', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadFormulas();
                showAlert('تم الحذف');
            }
        });
    }
}

loadFormulas();
</script>
{% endblock %}
