<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfume Vault - تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #3d2e1e, #5c4a32);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #faf9f7;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(92,74,50,0.3);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(139,115,85,0.12);
        }
        .login-card h2 {
            color: #5c4a32;
            margin-bottom: 30px;
            font-weight: 800;
        }
        .btn-login {
            background: linear-gradient(135deg, #5c4a32, #8b7355);
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-weight: 700;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #4a3b28, #7a6347);
        }
        .form-control:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 3px rgba(184,149,106,0.15);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <i class="bi bi-droplet-fill" style="font-size: 3rem; color: #b8956a;"></i>
            <h2>Perfume Vault</h2>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" name="username" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100">دخول</button>
        </form>

        <div class="text-center mt-4 text-muted">
            <small>admin / admin123</small>
        </div>
    </div>
</body>
</html>
